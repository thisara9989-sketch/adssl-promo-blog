name: Ads-SL Daily Blog — 3 Smart Posts

on:
  schedule:
    - cron: '0 3 * * *'   # 3:00 AM UTC = 8:30 AM Sri Lanka time
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run Smart Blog Poster
        env:
          GROQ_API_KEY:          ${{ secrets.GROQ_API_KEY }}
          BLOGGER_REFRESH_TOKEN: ${{ secrets.BLOGGER_REFRESH_TOKEN }}
          BLOGGER_CLIENT_ID:     ${{ secrets.BLOGGER_CLIENT_ID }}
          BLOGGER_CLIENT_SECRET: ${{ secrets.BLOGGER_CLIENT_SECRET }}
          BLOGGER_BLOG_ID:       ${{ secrets.BLOGGER_BLOG_ID }}
        run: python adssl_blog_v2.py
